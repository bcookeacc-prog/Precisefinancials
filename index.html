<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Precise Financials, LLC</title>
  <meta name="description" content="Precise Financials, LLC — Expert bookkeeping, tax preparation, payroll, and financial planning for individuals and small businesses." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0a1f44;
      --navy-light: #142d5e;
      --gold: #c9a84c;
      --gold-light: #e2c97e;
      --gold-pale: #f5ecd7;
      --white: #ffffff;
      --offwhite: #f8f6f1;
      --text-dark: #0d1b35;
      --text-muted: #5a6a82;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--offwhite); color: var(--text-dark); }
    nav {
      background: var(--navy);
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      border-bottom: 3px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { cursor: pointer; display: flex; align-items: center; }
    .logo img { height: 55px; width: auto; }
    .nav-links { display: flex; }
    .nav-links button {
      background: none;
      border: none;
      color: #afc0d8;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 20px;
      height: 70px;
      cursor: pointer;
      transition: color 0.2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
    }
    .nav-links button:hover,
    .nav-links button.active {
      color: var(--gold);
      border-bottom: 3px solid var(--gold);
    }
    .page { display: none; animation: fadeIn 0.4s ease; }
    .page.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero {
      background: var(--navy);
      padding: 6rem 3rem 5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent, transparent 40px,
        rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 80px
      );
    }
    .hero-badge {
      display: inline-block;
      border: 1px solid rgba(201,168,76,0.6);
      color: var(--gold-light);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 20px;
      border-radius: 2px;
      margin-bottom: 1.8rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.15;
      max-width: 640px;
      margin: 0 auto 1.25rem;
    }
    .hero h1 em { color: var(--gold); font-style: normal; }
    .hero p {
      color: #afc0d8;
      font-size: 18px;
      line-height: 1.75;
      max-width: 520px;
      margin: 0 auto 2.5rem;
      font-weight: 300;
    }
    .hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-gold {
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 14px 32px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .btn-gold:hover { background: var(--gold-light); }
    .btn-outline {
      background: none;
      color: var(--gold);
      border: 1.5px solid var(--gold);
      padding: 13px 32px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: rgba(201,168,76,0.12); }
    .trust-bar {
      background: var(--gold-pale);
      border-top: 1px solid rgba(201,168,76,0.3);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      flex-wrap: wrap;
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.5px;
    }
